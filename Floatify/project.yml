name: Floatify
options:
  bundleIdPrefix: com.floatify
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"

targets:
  Floatify:
    type: application
    platform: macOS
    sources:
      - path: Floatify
        excludes:
          - "**/.DS_Store"
          - "cli/**"
      - path: Floatify/Resources
        buildPhase: resources
      - path: Floatify/Assets.xcassets
        buildPhase: resources
      - path: ../animate-source/output/avatar-sprite-sheet.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floatify.app
        INFOPLIST_FILE: Floatify/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: Lottie
        product: Lottie

  floatify:
    type: tool
    platform: macOS
    sources:
      - path: Floatify/cli
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floatify.cli
        INFOPLIST_FILE: Floatify/cli/Info.plist
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
